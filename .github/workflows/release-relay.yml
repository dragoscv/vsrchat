name: Release relay

on:
  push:
    branches: [main]
    paths:
      - 'apps/relay/**'
      - 'packages/protocol/**'
      - 'packages/crypto/**'
      - '.github/workflows/release-relay.yml'
  workflow_dispatch:

concurrency:
  group: release-relay
  cancel-in-progress: false

env:
  PROJECT_ID: vsrchat
  REGION: europe-west1
  SERVICE: vsrchat-relay
  REPO: vsrchat

jobs:
  # Only run when GCP Workload Identity is configured. Until then the relay is
  # deployed manually (see docs/deploy-relay.md), so we skip cleanly instead of
  # failing every push.
  guard:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          WIF: ${{ secrets.GCP_WIF_PROVIDER }}
          SA: ${{ secrets.GCP_DEPLOY_SA }}
        run: |
          if [ -n "$WIF" ] && [ -n "$SA" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GCP_WIF_PROVIDER/GCP_DEPLOY_SA not set — skipping relay deploy (deploy manually per docs/deploy-relay.md)."
          fi

  deploy:
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/relay:${GITHUB_SHA::12}"
          docker build -f apps/relay/Dockerfile -t "$IMAGE" -t "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/relay:latest" .
          docker push "$IMAGE"
          docker push "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/relay:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --timeout 3600 \
            --min-instances 0 \
            --max-instances 2 \
            --set-env-vars "VSRCHAT_ALLOWED_GITHUB_IDS=${{ secrets.VSRCHAT_ALLOWED_GITHUB_IDS }},VSRCHAT_ALLOWED_GITHUB_LOGINS=${{ secrets.VSRCHAT_ALLOWED_GITHUB_LOGINS }}"
