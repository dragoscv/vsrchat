name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so turbo can diff against the PR base branch.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Resolve the PR base ref so turbo can scope to affected packages.
      - name: Resolve affected filter
        id: scope
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          base="${BASE_REF:-main}"
          git fetch --no-tags --depth=1 origin "$base" || true
          if git rev-parse --verify --quiet "origin/$base" >/dev/null; then
            echo "filter=...[origin/$base]" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Base ref origin/$base not found — running all packages."
            echo "filter=" >> "$GITHUB_OUTPUT"
          fi

      - name: Typecheck (affected)
        run: pnpm turbo run typecheck ${{ steps.scope.outputs.filter && format('--filter={0}', steps.scope.outputs.filter) || '' }}

      - name: Lint (affected)
        run: pnpm turbo run lint ${{ steps.scope.outputs.filter && format('--filter={0}', steps.scope.outputs.filter) || '' }}

      - name: Test (affected)
        run: pnpm turbo run test ${{ steps.scope.outputs.filter && format('--filter={0}', steps.scope.outputs.filter) || '' }}

      - name: Build (affected)
        env:
          SKIP_ENV_VALIDATION: '1'
          AUTH_SECRET: ci-placeholder-secret-0000000000000000
        run: pnpm turbo run build ${{ steps.scope.outputs.filter && format('--filter={0}', steps.scope.outputs.filter) || '' }}

      - name: Release gate
        run: node scripts/check-release.mjs
